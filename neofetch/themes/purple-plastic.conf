print_info() {
    info title

    # Electric purple for the outline, neon green for accents
    local PU="$(color 4)"   # electric purple  (#4840C7)
    local GR="$(color 2)"   # neon green        (#39FF6E)
    local RS="$(color 7)"   # lavender white    (#C8BEFF)

    prin "${PU}┌──────────── ${RS}$(color 0)Software${PU} ────────────${RS}"
    info "${PU}│${RS} ${GR} OS " distro
    info "${PU}│${RS} ${GR} KER" kernel
    info "${PU}│${RS} $(color 3) PKG" packages
    info "${PU}│${RS} $(color 3) SHL" shell
    info "${PU}│${RS} $(color 3) WM " wm
    prin "${PU}├──────────── ${RS}$(color 0)Hardware${PU} ────────────${RS}"
    info "${PU}│${RS} $(color 3) UPT" uptime
    info "${PU}│${RS} $(color 3) MOD" model
    info "${PU}│${RS} $(color 3) CPU" cpu
    info "${PU}│${RS} $(color 3) GPU" gpu
    info "${PU}│${RS} $(color 3) MEM" memory
    prin "${PU}└──────────────────────────────────────────────────────${RS}"

    prin "$(color 7)　　　　　　　　　　　I $(color 2)󰋑 $(color 7)Archcraft"

    info cols
}


##--------- Title

title_fqdn="off"


##--------- Kernel

kernel_shorthand="off"


##--------- Distro

distro_shorthand="off"
os_arch="on"


##--------- Uptime

uptime_shorthand="on"


##--------- Memory

memory_percent="off"
memory_unit="gib"


##--------- Packages

package_managers="on"


##--------- Shell

shell_path="off"
shell_version="on"


##--------- CPU

speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="off"
cpu_temp="off"


##--------- GPU

gpu_brand="on"
gpu_type="all"


##--------- Resolution

refresh_rate="on"


##--------- Gtk Theme / Icons / Font

gtk_shorthand="off"
gtk2="on"
gtk3="on"


##--------- IP Address

public_ip_host="http://ident.me"
public_ip_timeout=2

de_version="on"


##--------- Disk

disk_show=('/')
disk_subtitle="mount"
disk_percent="on"


##--------- Song

music_player="auto"
song_format="%artist% - %title%"
song_shorthand="off"
mpc_args=()


##--------- Text Colors
# color4 = electric purple, color2 = neon green, color7 = lavender white
# order: 'title', '@', 'underline', 'subtitle', 'colon', 'info'
colors=(2 4 4 7 4 7)


##--------- Text Options

bold="on"
underline_enabled="on"
underline_char="-"

# Arrow separator — punchy, fits the plastic aesthetic
separator=" 🢒"


##--------- Color Blocks

block_range=(0 15)
color_blocks="off"
block_width=3
block_height=1
col_offset="auto"

##--------- Progress Bars

bar_char_elapsed="█"
bar_char_total="░"
bar_border="off"
bar_length=15

# neon green fill on electric purple track
bar_color_elapsed="2"
bar_color_total="4"

cpu_display="off"
memory_display="off"
battery_display="off"
disk_display="off"


##--------- Backend Settings

image_backend="kitty"
image_source="$HOME/.config/neofetch/images/purple-plastic.png"


##--------- Ascii Options

ascii_distro="auto"

# All purple — monochromatic block using color4 (electric purple)
ascii_colors=(2 2 2 2 2 2)
ascii_bold="on"


##--------- Image Options

image_loop="off"
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"
image_size="300px"
gap=2
yoffset=0
xoffset=0
background_color=


##--------- Misc Options

stdout="off"
