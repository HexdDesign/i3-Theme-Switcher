##--------- Title
title_fqdn="off"

##--------- Kernel
kernel_shorthand="off"

##--------- Distro
distro_shorthand="off"
os_arch="on"

##--------- Uptime
uptime_shorthand="on"

##--------- Memory
memory_percent="off"
memory_unit="gib"

##--------- Packages
package_managers="on"

##--------- Shell
shell_path="off"
shell_version="on"

##--------- CPU
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="off"
cpu_temp="off"

##--------- GPU
gpu_brand="on"
gpu_type="all"

##--------- Resolution
refresh_rate="on"

##--------- Gtk Theme / Icons / Font
gtk_shorthand="off"
gtk2="on"
gtk3="on"

##--------- IP Address
public_ip_host="http://ident.me"
public_ip_timeout=2
de_version="on"

##--------- Disk
disk_show=('/')

##--------- Text Colors
# title, @, underline, subtitle, colon, info
colors=(1 7 1 7 1 7)

##--------- Text Options
bold="on"
underline_enabled="on"
underline_char="-"
separator=" рџў’"

##--------- Color Blocks
block_range=(0 15)
color_blocks="off"
block_width=3
block_height=1
col_offset="auto"

##--------- Progress Bars
bar_char_elapsed="в–€"
bar_char_total="в–‘"
bar_border="off"
bar_length=15
bar_color_elapsed="1"
bar_color_total="3"
cpu_display="off"
memory_display="off"
battery_display="off"
disk_display="off"

##--------- Backend Settings
image_backend="kitty"
image_source="$HOME/.config/neofetch/images/crimson.png"

##--------- Ascii Options
ascii_distro="auto"
ascii_colors=(1 1 1 1 1 1)
ascii_bold="on"

##--------- Image Options
image_loop="off"
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"
image_size="300px"
gap=2
yoffset=0
xoffset=0
background_color=

##--------- Misc Options
stdout="off"
