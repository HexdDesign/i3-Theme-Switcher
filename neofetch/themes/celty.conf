print_info() {
    info title

    local WH="$(color 7)"
    local GR="$(color 7)"
    local RS="$(color 7)"

    prin "${WH}┌──────────── ${RS}$(color 7)Software${WH} ────────────${RS}"
    info "${WH}│${RS} $(color 8) OS " distro
    info "${WH}│${RS} $(color 8) KER" kernel
    info "${WH}│${RS} $(color 8) PKG" packages
    info "${WH}│${RS} $(color 8) SHL" shell
    info "${WH}│${RS} $(color 8) TER" term
    info "${WH}│${RS} $(color 8) WM " wm
    info "${WH}│${RS} $(color 8) SNG" song
    prin "${WH}├──────────── ${RS}$(color 7)Hardware${WH} ────────────${RS}"
    info "${WH}│${RS} $(color 8) UPT" uptime
    info "${WH}│${RS} $(color 8) HST" model
    info "${WH}│${RS} $(color 8) CPU" cpu
    info "${WH}│${RS} $(color 8) GPU" gpu
    info "${WH}│${RS} $(color 8) MEM" memory
    prin "${WH}└──────── ${RS}$(color 0)󰝤 $(color 7)󰝤 $(color 8)󰝤 $(color 15)󰝤 $(color 7)󰝤 $(color 8)󰝤 $(color 15)󰝤 $(color 7)󰝤 ${WH}─────────${RS}"

    prin "$(color 7)　　　　　　　　　　　I $(color 8)󰋑 $(color 7)Archcraft"

    info cols
}

title_fqdn="off"
kernel_shorthand="off"
distro_shorthand="off"
os_arch="on"
uptime_shorthand="on"
memory_percent="off"
memory_unit="gib"
package_managers="on"
shell_path="off"
shell_version="on"
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="off"
cpu_temp="off"
gpu_brand="on"
gpu_type="all"
refresh_rate="on"
gtk_shorthand="off"
gtk2="on"
gtk3="on"
public_ip_host="http://ident.me"
public_ip_timeout=2
de_version="on"
disk_show=('/')
disk_subtitle="mount"
disk_percent="on"
music_player="auto"
song_format="%artist% - %title%"
song_shorthand="off"
mpc_args=()

# 7 = white, 8 = dark gray — pure monochrome
colors=(7 8 7 8 7 8)

bold="on"
underline_enabled="on"
underline_char="-"
separator=" 🢒"

block_range=(0 15)
color_blocks="off"
block_width=3
block_height=1
col_offset="auto"

bar_char_elapsed="█"
bar_char_total="░"
bar_border="off"
bar_length=15
bar_color_elapsed="7"
bar_color_total="8"

cpu_display="off"
memory_display="off"
battery_display="off"
disk_display="off"

image_backend="kitty"
image_source="$HOME/.config/neofetch/images/celty.png"

ascii_distro="auto"
ascii_colors=(7 8 7 8 7 8)
ascii_bold="on"

image_loop="off"
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"
image_size="300px"
gap=2
yoffset=0
xoffset=0
background_color=

stdout="off"
