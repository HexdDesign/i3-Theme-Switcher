# Load current theme (set by theme switcher)
[[ -f "$HOME/.config/neofetch/themes/current_theme.conf" ]] && source "$HOME/.config/neofetch/themes/current_theme.conf"


print_info() {
    info title

   
    local YL="$(color 5)"
    local RS="$(color 7)"

    prin "${YL}┌──────────── ${RS}$(color 4)Software${YL} ────────────${RS}"
    info "${YL}│${RS} $(color 5) OS " distro
    info "${YL}│${RS} $(color 5) KER" kernel
    info "${YL}│${RS} $(color 6) PKG" packages
    info "${YL}│${RS} $(color 6) SHL" shell
    info "${YL}│${RS} $(color 6) TER" term
    info "${YL}│${RS} $(color 6) WM " wm
    info "${YL}│${RS} $(color 7) SNG" song
    prin "${YL}├──────────── ${RS}$(color 4)Hardware${YL} ────────────${RS}"
    info "${YL}│${RS} $(color 7) UPT" uptime
    info "${YL}│${RS} $(color 5) HST" model
    info "${YL}│${RS} $(color 6) CPU" cpu
    info "${YL}│${RS} $(color 6) GPU" gpu
    info "${YL}│${RS} $(color 5) MEM" memory
    prin "${YL}└──────── ${RS}$(color 0)󰝤 $(color 1)󰝤 $(color 2)󰝤 $(color 3)󰝤 $(color 4)󰝤 $(color 5)󰝤 $(color 6)󰝤 $(color 7)󰝤 ${YL}─────────${RS}"

    prin "$(color 7)　　　　　　　　　　　I $(color 5)󰋑 $(color 7)Archcraft"

    info cols
}

# Title
title_fqdn="off"

# Kernel
kernel_shorthand="on"

# Distro
distro_shorthand="off"
os_arch="off"

# Uptime
uptime_shorthand="on"

# Memory
memory_percent="off"
memory_unit="gib"

# Packages
package_managers="on"

# Shell
shell_path="off"
shell_version="on"

# CPU
speed_type="bios_limit"
speed_shorthand="off"
cpu_brand="on"
cpu_speed="on"
cpu_cores="off"
cpu_temp="off"

# GPU
gpu_brand="on"
gpu_type="all"

# Resolution
refresh_rate="on"

# GTK
gtk_shorthand="off"
gtk2="on"
gtk3="on"

public_ip_host="http://ident.me"
public_ip_timeout=2
de_version="on"
disk_show=('/')
disk_subtitle="mount"
disk_percent="on"

music_player="auto"
song_format="%artist% - %title%"
song_shorthand="off"
mpc_args=()


# Colors
colors=(1 2 3 4 5 6)

# Text Colors — BRS palette

title_color=(36)          
# cyan
at_color=(36)             
# cyan
underline_color=(34)      
# blue
subtitle_color=(36)       
# cyan
colon_color=(37)         
# fg
info_color=(37)           
# fg

# Underline
underline_enabled="on"
underline_char="-"

separator=" 🢒"

# Bold
bold="on"

# Image
image_backend="kitty"
image_source="$HOME/.config/neofetch/images/brs.png"
ascii_distro="auto"

ascii_colors=(6 4 3 7 5 1)   
# cyan, blue, steel, white, bright-cyan, electric-blue
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
image_loop="off"


ascii_bold="on"
color_blocks="off"


bar_char_elapsed="█"
bar_char_total="░"

bar_border="off"
bar_length=15
bar_color_elapsed="2"
bar_color_total="6"

cpu_display="off"
memory_display="off"
battery_display="off"
disk_display="off"

crop_mode="normal"
crop_offset="center"
image_size="320px"


# Other
separator=":"
block_width=3
block_height=1
col_offset="auto"
block_range=(0 15)
gap=2
yoffset=0
xoffset=0
background_color=
stdout="off"
