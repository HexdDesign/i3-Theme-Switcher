# Celty
# Monochrome terminal palette. The Black Rider rides in grayscale.
background            #0d0d0d
foreground            #f0f0f0
selection_background  #2a2a2a
selection_foreground  #f0f0f0
cursor                #c8c8c8
cursor_text_color     #0d0d0d

# Black (darkest grays)
color0  #1a1a1a
color8  #333333

# Red → bright white (urgent)
color1  #ffffff
color9  #ffffff

# Green → light gray
color2  #aaaaaa
color10 #bbbbbb

# Yellow → mid-light gray
color3  #cccccc
color11 #dddddd

# Blue → mid gray
color4  #888888
color12 #999999

# Magenta → dim gray
color5  #666666
color13 #777777

# Cyan → accent gray
color6  #c8c8c8
color14 #d4d4d4

# White (brightest grays)
color7  #e0e0e0
color15 #f0f0f0

background_opacity 0.92
