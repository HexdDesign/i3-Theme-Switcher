# =============================
# Purple Plastic Theme
# =============================

set $bg      #1a1533
set $fg      #e8e0ff
set $border  #5b4eff
set $accent  #39ff14
set $urgent  #ff3f6c
set $gray    #2d2650

# Window colors
#                       border   background  text    indicator  child_border
client.focused          $border  $border     $fg     $accent    $border
client.focused_inactive $gray    $gray       $fg     $gray      $gray
client.unfocused        $bg      $bg         $fg     $bg        $bg
client.urgent           $urgent  $urgent     $fg     $urgent    $urgent
