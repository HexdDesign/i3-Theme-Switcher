# =============================
# BRS Theme (Black Rock Shooter)
# =============================

set $bg      #0a0e17
set $fg      #cce0f0
set $border  #1a4a7a
set $accent  #00c8d4
set $urgent  #1e88e5
set $gray    #152033

# Window colors
#                       border   background  text    indicator  child_border
client.focused          $accent  $accent     $bg     $accent    $accent
client.focused_inactive $gray    $gray       $fg     $gray      $gray
client.unfocused        $bg      $bg         $fg     $bg        $bg
client.urgent           $urgent  $urgent     $fg     $urgent    $urgent
