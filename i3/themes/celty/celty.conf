# =============================
# Celty Theme - Monochrome
# =============================

set $bg      #0d0d0d
set $fg      #f0f0f0
set $border  #c8c8c8
set $accent  #888888
set $urgent  #ffffff
set $gray    #1e1e1e

# Window colors
#                       border   background  text    indicator  child_border
client.focused          $border  $border     $bg     $fg        $border
client.focused_inactive $gray    $gray       $accent $gray      $gray
client.unfocused        $bg      $bg         $accent $bg        $bg
client.urgent           $urgent  $urgent     $bg     $urgent    $urgent
