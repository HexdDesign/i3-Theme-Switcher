#################################
# BACKEND
#################################
backend = "glx";
vsync = true;

# use-damage = true causes unblurred regions/tearing when blur is enabled.
# Keep it off while blur is active.
#use-damage = false;

#################################
# CORNERS (FLOATING ONLY)
#################################
corner-radius = 14;
round-borders = 1;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "class_g = 'Polybar'",
  "class_g = 'Rofi'"
];

#################################
# SHADOWS
#################################
shadow = true;
shadow-radius = 22;
shadow-offset-x = -14;
shadow-offset-y = -14;
shadow-opacity = 0.32;
shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Eww'",
  "class_i = 'Eww'",
  "class_g = 'eww'",
  "class_i = 'eww'",
  "name ~= 'Eww - .*'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
# OPACITY (global)
#################################
inactive-opacity = 0.85;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

focus-exclude = [
  "class_g = 'Eww'",
  "class_i = 'Eww'",
  "class_g = 'eww'",
  "class_i = 'eww'"
];

#################################
# BLUR
#################################
blur-method = "dual_kawase";
blur-strength = 6;
blur-background = true;
blur-background-frame = false;
blur-background-fixed = false;

# blur-kern is only used by kernel/box/gaussian methods, not dual_kawase.
# Leaving it set causes conflicts on some builds — removed.

blur-background-exclude = [
  "class_g = 'Rofi'",
  "window_type = 'desktop'",
  "name ~= 'Eww - .*'",
  "class_g = 'Eww'",
  "class_i = 'Eww'",
  "class_g = 'eww'",
  "class_i = 'eww'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
# OPACITY RULES
#################################
opacity-rule = [
  # Eww — force fully opaque, no flicker
  "100:class_g = 'Eww'",
  "90:class_i = 'Eww'",
  "100:class_g = 'eww'",
  "90:class_i = 'eww'",
  "100:name ~= 'Eww - .*'",

  # Bars / launchers
  "100:class_g = 'Polybar'",
  "100:class_g = 'Rofi'",

  # Apps
  "80:class_g = 'Thunar' && focused",
  "70:class_g = 'Thunar' && !focused",
  "90:class_g = 'Geany' && focused",
  "80:class_g = 'Geany' && !focused",
  "85:class_g = 'Alacritty' && focused",
  "75:class_g = 'Alacritty' && !focused",
  "80:class_g = 'kitty'",
  "95:class_g = 'firefox' && focused",
  "80:class_g = 'firefox' && !focused"
];

#################################
# FADING
#################################
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 8;

fade-exclude = [
  "class_g = 'Eww'",
  "class_i = 'Eww'",
  "class_g = 'eww'",
  "class_i = 'eww'",
  "name ~= 'Eww - .*'",
  "class_g = 'Polybar'",
  "class_g = 'Rofi'"
];

# no-fading-openclose duplicates the fade-exclude logic for eww and causes
# timing races on open/close for other windows. Disable it.
no-fading-openclose = false;
no-fading-destroyed-argb = true;

#################################
# MISC
#################################
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
detect-rounded-corners = true;

# transparent-clipping + blur + GLX = artifacts and flicker. Off.
transparent-clipping = false;

# unredir-if-possible bypasses the compositor for fullscreen apps (good for games).
# Keep off if you're seeing flashing when switching to/from fullscreen.
unredir-if-possible = false;

log-level = "warn";

# xrender-sync-fence helps with tearing on some NVIDIA setups but causes
# stalls on others. Remove if you see freezes or slowdowns.
xrender-sync-fence = true;

#################################
# ANIMATIONS (picom-ftlabs-git)
#################################
animations = false;

animation-exclude = [
  "class_g = 'Eww'",
  "class_i = 'Eww'",
  "class_g = 'eww'",
  "class_i = 'eww'",
  "name ~= 'Eww - .*'"
];

#################################
# WINDOW TYPES
#################################
wintypes:
{
  dock = {
    shadow = false;
    blur-background = false;
    corner-radius = 0;
    opacity = 1.0;
  };

  desktop = {
    shadow = false;
    blur-background = false;
    corner-radius = 0;
  };

  dialog = {
    shadow = true;
    opacity = 1.0;
  };

  # eww popup windows use windowtype "utility"
  utility = {
    shadow = false;
    blur-background = false;
    fade = false;
    focus = false;
    opacity = 1.0;
    corner-radius = 14;
  };

  popup_menu = {
    opacity = 1.0;
    shadow = false;
    fade = false;
    full-shadow = false;
  };

  dropdown_menu = {
    opacity = 1.0;
    shadow = false;
    fade = false;
    full-shadow = false;
  };

  tooltip = {
    fade = true;
    shadow = false;
    opacity = 0.95;
    focus = true;
  };

  notification = {
    shadow = true;
    opacity = 1.0;
  };
};
